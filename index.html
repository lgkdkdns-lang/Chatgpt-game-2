<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Müllmonster Deluxe</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

    <div id="topbar">

        <div id="score">
            🗑️ <span id="points">0</span>
        </div>

        <div id="lives">
            ❤️❤️❤️
        </div>

    </div>


    <div id="player">
        🧹
    </div>


    <div id="gameOver">

        <div id="deathBox">

            <h1>💀 Chaos im Haus!</h1>

            <p>
            Die Katzen haben dich erwischt!
            </p>

            <p>
            Punkte: <span id="finalScore">0</span>
            </p>

            <button id="restart">
                🔄 Nochmal
            </button>

        </div>

    </div>


</div>



<!-- Virtueller Joystick -->

<div id="joystick">

    <div id="stick"></div>

</div>



<script src="script.js"></script>

</body>
</html>
